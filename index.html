<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Battle — 3D Wave Survival</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  /* HUD */
  #hud { position: fixed; top: 0; left: 0; right: 0; pointer-events: none; z-index: 10; padding: 20px; display: flex; justify-content: space-between; }
  #hud-left, #hud-right { display: flex; flex-direction: column; gap: 6px; }
  .hud-label { color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .hud-value { color: #fff; font-size: 20px; font-weight: bold; text-shadow: 0 0 8px rgba(0,0,0,0.8); }
  #health-bar-bg { width: 200px; height: 14px; background: rgba(0,0,0,0.6); border: 1px solid #555; border-radius: 3px; overflow: hidden; margin-top: 2px; }
  #health-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #4a4, #6c6); transition: width 0.3s; }
  #score-display { text-align: right; }

  /* Wave announcement */
  #wave-announce { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 48px; font-weight: bold; text-shadow: 0 0 20px rgba(255,100,0,0.8), 0 2px 4px rgba(0,0,0,0.9); opacity: 0; transition: opacity 0.5s; z-index: 20; pointer-events: none; letter-spacing: 4px; }
  #wave-announce.visible { opacity: 1; }

  /* Controls hint */
  #controls-hint { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-size: 14px; z-index: 10; pointer-events: none; transition: opacity 2s; }
  #controls-hint.hidden { opacity: 0; }

  /* Game over */
  #game-over { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 30; }
  #game-over.visible { display: flex; }
  #game-over h1 { color: #ff4444; font-size: 64px; margin-bottom: 10px; text-shadow: 0 0 30px rgba(255,0,0,0.5); }
  #game-over .final-score { color: #fff; font-size: 28px; margin-bottom: 8px; }
  #game-over .final-wave { color: #aaa; font-size: 18px; margin-bottom: 30px; }
  #restart-btn { padding: 14px 40px; font-size: 18px; background: #4a7a3f; color: #fff; border: none; border-radius: 6px; cursor: pointer; pointer-events: all; transition: background 0.2s; }
  #restart-btn:hover { background: #5a9a4f; }

  /* Crosshair */
  #crosshair { position: fixed; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); z-index: 15; pointer-events: none; opacity: 0.5; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #fff; }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

  /* Minimap */
  #minimap { position: fixed; bottom: 20px; left: 20px; width: 160px; height: 160px; background: rgba(0,0,0,0.5); border: 1px solid #555; border-radius: 4px; z-index: 10; pointer-events: none; }

  /* Kill streak */
  #kill-streak { position: fixed; top: 50%; right: 30px; transform: translateY(-50%); color: #ff8800; font-size: 28px; font-weight: bold; text-shadow: 0 0 15px rgba(255,136,0,0.6); z-index: 15; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
  #kill-streak.visible { opacity: 1; }

  /* Wave progress */
  #wave-progress-bg { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: rgba(0,0,0,0.3); z-index: 12; pointer-events: none; }
  #wave-progress { height: 100%; background: #ff8800; transition: width 0.3s; width: 0%; }

  /* Damage numbers */
  .dmg-number { position: fixed; color: #ffcc00; font-size: 18px; font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.8); z-index: 16; pointer-events: none; animation: dmgFloat 0.8s ease-out forwards; }
  .dmg-number.crit { color: #ff4444; font-size: 24px; }
  @keyframes dmgFloat { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }

  /* Enemies remaining */
  #enemies-display { color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  /* Weapon selector */
  #weapon-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 15; pointer-events: none; }
  .weapon-slot { width: 50px; height: 50px; background: rgba(0,0,0,0.5); border: 2px solid #555; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; }
  .weapon-slot.active { border-color: #ff8800; background: rgba(255,136,0,0.15); }
  .weapon-slot .weapon-key { color: #888; font-size: 10px; }
  .weapon-slot.active .weapon-key { color: #ff8800; }
  .weapon-slot .weapon-icon { font-size: 18px; }
  .weapon-slot .weapon-name { color: #ccc; font-size: 8px; margin-top: 1px; }
  .weapon-slot.active .weapon-name { color: #fff; }

  /* Power-up indicators */
  #powerup-bar { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 15; pointer-events: none; }
  .powerup-icon { width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: rgba(0,0,0,0.5); border: 1px solid; position: relative; }
  .powerup-icon .pu-timer { position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; border-radius: 1px; }

  /* Upgrade Shop */
  #shop-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 25; }
  #shop-overlay.visible { display: flex; }
  #shop-container { background: rgba(20,20,15,0.95); border: 1px solid #555; border-radius: 10px; padding: 30px 40px; max-width: 600px; width: 90%; }
  #shop-container h2 { color: #ff8800; font-size: 28px; margin-bottom: 5px; text-align: center; }
  #shop-scrap { color: #ffcc00; font-size: 16px; text-align: center; margin-bottom: 20px; }
  .shop-upgrades { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .shop-item { background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 8px; padding: 14px; cursor: pointer; pointer-events: all; transition: all 0.2s; }
  .shop-item:hover { border-color: #ff8800; background: rgba(255,136,0,0.1); }
  .shop-item.disabled { opacity: 0.4; cursor: not-allowed; }
  .shop-item .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .shop-item .item-name { color: #fff; font-size: 14px; font-weight: bold; }
  .shop-item .item-cost { color: #ffcc00; font-size: 12px; }
  .shop-item .item-desc { color: #aaa; font-size: 11px; line-height: 1.4; }
  .shop-item .item-level { color: #888; font-size: 10px; margin-top: 4px; }
  #shop-continue { display: block; margin: 20px auto 0; padding: 10px 30px; font-size: 16px; background: #4a7a3f; color: #fff; border: none; border-radius: 6px; cursor: pointer; pointer-events: all; }
  #shop-continue:hover { background: #5a9a4f; }
  #shop-timer { color: #aaa; font-size: 12px; text-align: center; margin-top: 8px; }

  /* Weather */
  #weather-indicator { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #ccc; font-size: 12px; z-index: 12; pointer-events: none; text-transform: uppercase; letter-spacing: 2px; opacity: 0; transition: opacity 0.5s; }
  #weather-indicator.visible { opacity: 0.7; }
</style>
</head>
<body>

<div id="hud">
  <div id="hud-left">
    <span class="hud-label">Health</span>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
  </div>
  <div id="hud-right">
    <div id="score-display">
      <span class="hud-label">Score</span><br>
      <span class="hud-value" id="score-text">0</span>
    </div>
    <div>
      <span class="hud-label">Wave</span><br>
      <span class="hud-value" id="wave-text">1</span>
    </div>
    <div id="enemies-display">Enemies: 0</div>
  </div>
</div>

<div id="wave-announce">WAVE 1</div>
<div id="controls-hint">WASD to move &nbsp;|&nbsp; Mouse to aim &nbsp;|&nbsp; Click to fire</div>
<div id="game-over">
  <h1>DESTROYED</h1>
  <div class="final-score" id="final-score">Score: 0</div>
  <div class="final-wave" id="final-wave">Wave 1</div>
  <button id="restart-btn">RESTART</button>
</div>
<div id="crosshair"></div>
<canvas id="minimap" width="160" height="160"></canvas>
<div id="kill-streak"></div>
<div id="wave-progress-bg"><div id="wave-progress"></div></div>
<div id="dmg-numbers"></div>
<div id="weather-indicator"></div>
<div id="weapon-bar">
  <div class="weapon-slot active" id="weapon-0"><span class="weapon-key">1</span><span class="weapon-icon">🎯</span><span class="weapon-name">Cannon</span></div>
  <div class="weapon-slot" id="weapon-1"><span class="weapon-key">2</span><span class="weapon-icon">⚡</span><span class="weapon-name">MG</span></div>
  <div class="weapon-slot" id="weapon-2"><span class="weapon-key">3</span><span class="weapon-icon">💥</span><span class="weapon-name">Rocket</span></div>
</div>
<div id="powerup-bar"></div>
<div id="shop-overlay">
  <div id="shop-container">
    <h2>ARMORY</h2>
    <div id="shop-scrap">Scrap: 0</div>
    <div class="shop-upgrades" id="shop-items"></div>
    <button id="shop-continue">DEPLOY</button>
    <div id="shop-timer">Auto-deploy in 15s...</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// 1. CONSTANTS
// ============================================================
const MAP_SIZE = 60;
const HALF_MAP = MAP_SIZE / 2;
const PLAYER_SPEED = 8;
const PLAYER_HP = 100;
const PLAYER_RELOAD = 0.5;
const PLAYER_BULLET_SPEED = 28;
const PLAYER_BULLET_DAMAGE = 25;
const ENEMY_BASE_SPEED = 5;
const ENEMY_BASE_HP = 50;
const ENEMY_RELOAD = 1.5;
const ENEMY_BULLET_SPEED = 18;
const ENEMY_BULLET_DAMAGE = 15;
const ENEMY_DETECT_RANGE = 30;
const ENEMY_FIRE_RANGE = 25;
const BARREL_EXPLOSION_DAMAGE = 40;
const BARREL_EXPLOSION_RADIUS = 5;
const MAX_PARTICLES = 200;

// Weapon definitions
const WEAPONS = [
  { name: 'Cannon',     speed: 28, damage: 25, reload: 0.5,  color: 0xffcc44, radius: 0.10, aoe: 0 },
  { name: 'MG',         speed: 35, damage: 6,  reload: 0.08, color: 0xffffaa, radius: 0.05, aoe: 0 },
  { name: 'Rocket',     speed: 18, damage: 60, reload: 1.8,  color: 0xff4400, radius: 0.15, aoe: 4 },
];
let currentWeapon = 0;

// Power-up definitions & state
const POWERUP_TYPES = ['health', 'shield', 'speed', 'rapidfire'];
const POWERUP_DURATION = 8; // seconds for temporary buffs
const activePowerups = { shield: 0, speed: 0, rapidfire: 0 };
const powerupEntities = new Set();

// Scrap & upgrades
let scrap = 0;
const upgrades = {
  armor:   { level: 0, maxLevel: 5, baseCost: 50,  costMult: 1.5, label: 'Reinforced Armor',   desc: '+20 max HP per level' },
  speed:   { level: 0, maxLevel: 5, baseCost: 60,  costMult: 1.5, label: 'Improved Engine',     desc: '+8% move speed per level' },
  firepower:{ level: 0, maxLevel: 5, baseCost: 70,  costMult: 1.5, label: 'Upgraded Cannon',     desc: '+15% bullet damage per level' },
  reload:  { level: 0, maxLevel: 5, baseCost: 65,  costMult: 1.5, label: 'Auto-Loader',          desc: '-10% reload time per level' },
};
let shopTimer = 0;
let shopOpen = false;

// Weather system
const WEATHER_TYPES = ['clear', 'sandstorm', 'rain', 'fog'];
let currentWeather = 'clear';
let weatherTimer = 0;
let weatherParticles = [];
let rainAudioNode = null;
let rainGainNode = null;

// ============================================================
// 2. THREE.JS SETUP
// ============================================================
let scene, camera, renderer;
let playerEntityId = null;
let nextEntityId = 1;
let gameState = 'playing'; // playing, gameover
let score = 0;
let currentWave = 1;
let waveTimer = 0;
let waveEnemiesAlive = 0;
let waveSpawned = false;
let clock = new THREE.Clock();
let killStreak = 0;
let killStreakTimer = 0;
let waveEnemyTotal = 0;
let isPlayerMoving = false;
let engineOsc = null, engineGain = null;
let ambienceStarted = false;

// ECS storage
const entities = new Set();
const components = {
  mesh: new Map(),       // id -> THREE.Mesh
  transform: new Map(),  // id -> { position: Vector3, rotation: number, velocity: Vector3 }
  health: new Map(),     // id -> { current, max }
  tankControl: new Map(),// id -> { speed, turnRate, turretAngle, reloadTime, lastFired, type:'player'|'enemy' }
  bullet: new Map(),     // id -> { direction: Vector3, speed, damage, owner }
  destructible: new Map(),// id -> { type: 'wall'|'barrel' }
  enemyAI: new Map(),    // id -> { state:'patrol'|'chase'|'flee', targetPos: Vector3, patrolTimer }
  turretMesh: new Map(), // id -> THREE.Mesh (turret group)
  barrelTip: new Map(),  // id -> THREE.Mesh (tip of barrel for bullet spawn)
};

const bullets = [];
const particles = [];

// Input
const keys = {};
const mouse = { x: 0, y: 0, down: false };

// ============================================================
// 2b. SOUND SYSTEM (Web Audio API — procedural)
// ============================================================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    switch(type) {
      case 'fire': {
        // Short punchy boom
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.15);
        // Noise burst
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
        const noise = ctx.createBufferSource();
        noise.buffer = buf;
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0.2, now);
        ng.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        noise.connect(ng).connect(ctx.destination);
        noise.start(now);
        break;
      }
      case 'explosion': {
        // Big boom
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(15, now + 0.5);
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.5);
        // Noise
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
        const noise = ctx.createBufferSource();
        noise.buffer = buf;
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0.25, now);
        ng.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        noise.connect(ng).connect(ctx.destination);
        noise.start(now);
        break;
      }
      case 'tankHit': {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(60, now + 0.1);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.1);
        break;
      }
      case 'ricochet': {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(2000, now + 0.05);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.12);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.12);
        break;
      }
      case 'wallBreak': {
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - i / data.length);
        const noise = ctx.createBufferSource();
        noise.buffer = buf;
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0.15, now);
        ng.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        noise.connect(ng).connect(ctx.destination);
        noise.start(now);
        break;
      }
      case 'barrelExplode': {
        playSound('explosion');
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now + 0.1);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
        gain.gain.setValueAtTime(0.2, now + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now + 0.1);
        osc.stop(now + 0.4);
        break;
      }
      case 'powerup': {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
        g.gain.setValueAtTime(0.15, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.connect(g).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.2);
        break;
      }
      case 'rocketExplode': {
        playSound('explosion');
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(60, now);
        osc.frequency.exponentialRampToValueAtTime(10, now + 0.8);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
        osc.connect(g).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.8);
        break;
      }
    }
  } catch(e) {} // Silently fail if audio blocked
}

function startEngineSound() {
  try {
    const ctx = getAudioCtx();
    if (engineOsc) return;
    engineOsc = ctx.createOscillator();
    engineGain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 120;
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 35;
    engineGain.gain.value = 0;
    engineOsc.connect(filter).connect(engineGain).connect(ctx.destination);
    engineOsc.start();
  } catch(e) {}
}

function updateEngineSound(moving) {
  if (!engineOsc || !engineGain) return;
  const ctx = getAudioCtx();
  const targetFreq = moving ? 55 : 35;
  const targetGain = moving ? 0.04 : 0.01;
  engineOsc.frequency.setTargetAtTime(targetFreq, ctx.currentTime, 0.1);
  engineGain.gain.setTargetAtTime(targetGain, ctx.currentTime, 0.1);
}

function startAmbience() {
  if (ambienceStarted) return;
  ambienceStarted = true;
  try {
    const ctx = getAudioCtx();
    // Low rumble loop
    const buf = ctx.createBuffer(1, ctx.sampleRate * 4, ctx.sampleRate);
    const data = buf.getChannelData(0);
    let v = 0;
    for (let i = 0; i < data.length; i++) {
      v += (Math.random() * 2 - 1) * 0.02;
      v *= 0.998;
      data[i] = v;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    noise.loop = true;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 80;
    const gain = ctx.createGain();
    gain.gain.value = 0.08;
    noise.connect(filter).connect(gain).connect(ctx.destination);
    noise.start();

    // Distant artillery (random booms every 5-15s)
    setInterval(() => {
      if (gameState === 'playing') {
        try {
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = 'sawtooth';
          const baseFreq = 20 + Math.random() * 20;
          osc.frequency.setValueAtTime(baseFreq, now);
          osc.frequency.exponentialRampToValueAtTime(10, now + 0.8);
          g.gain.setValueAtTime(0.03, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
          osc.connect(g).connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.8);
        } catch(e) {}
      }
    }, 5000 + Math.random() * 10000);
  } catch(e) {}
}

function playTreadSound() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - i / data.length) * 0.15;
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.06, now);
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 300;
    noise.connect(filter).connect(ng).connect(ctx.destination);
    noise.start(now);
  } catch(e) {}
}

function init() {
  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87919a);
  scene.fog = new THREE.Fog(0x87919a, 50, 80);

  // Camera — isometric angled
  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  // Lighting
  const ambient = new THREE.AmbientLight(0x888899, 0.5);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xffeedd, 1.0);
  sun.position.set(20, 30, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 100;
  sun.shadow.camera.left = -40;
  sun.shadow.camera.right = 40;
  sun.shadow.camera.top = 40;
  sun.shadow.camera.bottom = -40;
  scene.add(sun);

  // Ground
  const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x8b7d5e, roughness: 0.9 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Build map
  buildMap();

  // Create player
  playerEntityId = createTank(0, 0, 'player');

  // Input
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Digit1') switchWeapon(0);
    if (e.code === 'Digit2') switchWeapon(1);
    if (e.code === 'Digit3') switchWeapon(2);
  });
  window.addEventListener('keyup', e => keys[e.code] = false);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mousedown', () => { mouse.down = true; startEngineSound(); startAmbience(); });
  window.addEventListener('mouseup', () => mouse.down = false);
  window.addEventListener('resize', onResize);
  document.getElementById('restart-btn').addEventListener('click', restartGame);

  // Hide controls hint after 5s
  setTimeout(() => document.getElementById('controls-hint').classList.add('hidden'), 5000);

  // Start first wave
  announceWave(1);
  spawnWave(1);

  // Hide cursor
  document.body.style.cursor = 'none';

  // Go
  animate();
}

// ============================================================
// 3. MAP GENERATION
// ============================================================
const mapGrid = []; // 2D array for collision

function buildMap() {
  // Initialize grid
  const gridSize = MAP_SIZE;
  for (let x = 0; x < gridSize; x++) {
    mapGrid[x] = [];
    for (let z = 0; z < gridSize; z++) {
      mapGrid[x][z] = 0; // 0=empty
    }
  }

  // Perimeter walls (indestructible)
  for (let i = 0; i < gridSize; i++) {
    createWall(-HALF_MAP + 0.5, -HALF_MAP + i + 0.5, true);
    createWall(HALF_MAP - 0.5, -HALF_MAP + i + 0.5, true);
    createWall(-HALF_MAP + i + 0.5, -HALF_MAP + 0.5, true);
    createWall(-HALF_MAP + i + 0.5, HALF_MAP - 0.5, true);
  }

  // Interior walls — strategic placement
  const wallLayouts = [
    // Central cross
    { x: 0, z: 0, w: 3, d: 1, destructible: false },
    { x: 0, z: 0, w: 1, d: 3, destructible: false },
    // Corner fortifications
    { x: -12, z: -12, w: 4, d: 1, destructible: true },
    { x: -12, z: -10, w: 1, d: 3, destructible: true },
    { x: 12, z: -12, w: 4, d: 1, destructible: true },
    { x: 13, z: -10, w: 1, d: 3, destructible: true },
    { x: -12, z: 12, w: 4, d: 1, destructible: true },
    { x: -12, z: 10, w: 1, d: 3, destructible: true },
    { x: 12, z: 12, w: 4, d: 1, destructible: true },
    { x: 13, z: 10, w: 1, d: 3, destructible: true },
    // Side walls
    { x: -6, z: 0, w: 1, d: 5, destructible: true },
    { x: 6, z: 0, w: 1, d: 5, destructible: true },
    { x: 0, z: -8, w: 5, d: 1, destructible: true },
    { x: 0, z: 8, w: 5, d: 1, destructible: true },
    // Scattered cover
    { x: -18, z: -4, w: 2, d: 1, destructible: true },
    { x: 18, z: 4, w: 2, d: 1, destructible: true },
    { x: -4, z: -18, w: 1, d: 2, destructible: true },
    { x: 4, z: 18, w: 1, d: 2, destructible: true },
  ];

  wallLayouts.forEach(w => {
    for (let dx = 0; dx < w.w; dx++) {
      for (let dz = 0; dz < w.d; dz++) {
        const wx = w.x + dx;
        const wz = w.z + dz;
        if (Math.abs(wx) < HALF_MAP - 1 && Math.abs(wz) < HALF_MAP - 1) {
          createWall(wx, wz, !w.destructible);
        }
      }
    }
  });

  // Explosive barrels
  const barrelPositions = [
    [-8, -6], [8, -6], [-8, 6], [8, 6],
    [-3, -15], [3, -15], [-3, 15], [3, 15],
    [-15, -3], [15, -3], [-15, 3], [15, 3],
    [0, -4], [0, 4],
  ];
  barrelPositions.forEach(([x, z]) => createBarrel(x, z));
}

function createWall(x, z, indestructible) {
  const id = nextEntityId++;
  entities.add(id);

  const height = indestructible ? 2.0 : 1.5;
  const color = indestructible ? 0x666660 : 0x8b6b4a;
  const geo = new THREE.BoxGeometry(1, height, 1);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.85, metalness: 0.05 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, height / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  components.mesh.set(id, mesh);
  components.transform.set(id, {
    position: new THREE.Vector3(x, height / 2, z),
    rotation: 0,
    velocity: new THREE.Vector3(),
    radius: 0.5
  });

  if (!indestructible) {
    components.destructible.set(id, { type: 'wall', hp: 3, maxHp: 3 });
  } else {
    components.destructible.set(id, { type: 'concrete', hp: Infinity, maxHp: Infinity });
  }

  // Mark grid
  const gx = Math.round(x + HALF_MAP);
  const gz = Math.round(z + HALF_MAP);
  if (gx >= 0 && gx < MAP_SIZE && gz >= 0 && gz < MAP_SIZE) {
    mapGrid[gx][gz] = id;
  }

  return id;
}

function createBarrel(x, z) {
  const id = nextEntityId++;
  entities.add(id);

  const geo = new THREE.CylinderGeometry(0.4, 0.4, 1.0, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0x884422, roughness: 0.6, metalness: 0.3 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 0.5, z);
  mesh.castShadow = true;
  scene.add(mesh);

  // Red band
  const bandGeo = new THREE.CylinderGeometry(0.42, 0.42, 0.15, 8);
  const bandMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.5 });
  const band = new THREE.Mesh(bandGeo, bandMat);
  band.position.y = 0.25;
  mesh.add(band);

  components.mesh.set(id, mesh);
  components.transform.set(id, {
    position: new THREE.Vector3(x, 0.5, z),
    rotation: 0,
    velocity: new THREE.Vector3(),
    radius: 0.4
  });
  components.destructible.set(id, { type: 'barrel', hp: 1, maxHp: 1 });

  const gx = Math.round(x + HALF_MAP);
  const gz = Math.round(z + HALF_MAP);
  if (gx >= 0 && gx < MAP_SIZE && gz >= 0 && gz < MAP_SIZE) {
    mapGrid[gx][gz] = id;
  }

  return id;
}

// ============================================================
// 4. TANK CREATION
// ============================================================
function createTank(x, z, type) {
  const id = nextEntityId++;
  entities.add(id);

  // Colors — player: olive drab (US military), enemy: desert tan
  const bodyColor = type === 'player' ? 0x4c5a32 : 0xa89060;
  const turretColor = type === 'player' ? 0x3e4c28 : 0x9a8250;
  const treadColor = type === 'player' ? 0x222211 : 0x332820;

  // Body
  const bodyGeo = new THREE.BoxGeometry(1.6, 0.6, 2.2);
  const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.7, metalness: 0.2 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.5;
  body.castShadow = true;

  // Turret group
  const turretGroup = new THREE.Group();
  turretGroup.position.y = 0.9;

  // Turret dome
  const turretGeo = new THREE.CylinderGeometry(0.45, 0.55, 0.4, 8);
  const turretMat = new THREE.MeshStandardMaterial({ color: turretColor, roughness: 0.6, metalness: 0.3 });
  const turret = new THREE.Mesh(turretGeo, turretMat);
  turretGroup.add(turret);

  // Barrel
  const barrelGeo = new THREE.CylinderGeometry(0.08, 0.1, 1.5, 6);
  const barrelMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.6 });
  const barrel = new THREE.Mesh(barrelGeo, barrelMat);
  barrel.rotation.x = Math.PI / 2;
  barrel.position.set(0, 0.1, 1.0);
  turretGroup.add(barrel);

  // Barrel tip (invisible marker)
  const tipGeo = new THREE.SphereGeometry(0.05);
  const tipMat = new THREE.MeshBasicMaterial({ visible: false });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.position.set(0, 0.1, 1.8);
  turretGroup.add(tip);

  // Treads
  const treadGeo = new THREE.BoxGeometry(0.3, 0.35, 2.4);
  const treadMat = new THREE.MeshStandardMaterial({ color: treadColor, roughness: 0.9, metalness: 0.1 });
  const treadL = new THREE.Mesh(treadGeo, treadMat);
  treadL.position.set(-0.85, 0.3, 0);
  body.add(treadL);
  const treadR = new THREE.Mesh(treadGeo, treadMat);
  treadR.position.set(0.85, 0.3, 0);
  body.add(treadR);

  // Assemble
  const group = new THREE.Group();
  group.add(body);
  group.add(turretGroup);
  group.position.set(x, 0, z);
  scene.add(group);

  components.mesh.set(id, group);
  components.turretMesh.set(id, turretGroup);
  components.barrelTip.set(id, tip);
  components.transform.set(id, {
    position: new THREE.Vector3(x, 0, z),
    rotation: 0,
    velocity: new THREE.Vector3(),
    radius: 1.1
  });

  if (type === 'player') {
    components.health.set(id, { current: PLAYER_HP, max: PLAYER_HP });
    components.tankControl.set(id, {
      speed: PLAYER_SPEED,
      reloadTime: PLAYER_RELOAD,
      lastFired: 0,
      type: 'player'
    });
  } else {
    const waveScale = 1 + (currentWave - 1) * 0.1;
    components.health.set(id, { current: Math.round(ENEMY_BASE_HP * waveScale), max: Math.round(ENEMY_BASE_HP * waveScale) });
    components.tankControl.set(id, {
      speed: ENEMY_BASE_SPEED * (1 + (currentWave - 1) * 0.05),
      reloadTime: ENEMY_RELOAD,
      lastFired: 0,
      type: 'enemy'
    });
    components.enemyAI.set(id, {
      state: 'patrol',
      targetPos: new THREE.Vector3(
        x + (Math.random() - 0.5) * 20,
        0,
        z + (Math.random() - 0.5) * 20
      ),
      patrolTimer: Math.random() * 3 + 1
    });
  }

  return id;
}

// 5. BULLET CREATION
// ============================================================
function createBullet(position, direction, speed, damage, owner, color, radius, aoe) {
  const id = nextEntityId++;
  entities.add(id);

  const geo = new THREE.SphereGeometry(radius || 0.1, 6, 6);
  const mat = new THREE.MeshBasicMaterial({ color: color || 0xffcc44 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(position);
  scene.add(mesh);

  // Trail light
  const light = new THREE.PointLight(color || 0xffaa22, 0.5, 5);
  mesh.add(light);

  components.mesh.set(id, mesh);
  components.transform.set(id, {
    position: position.clone(),
    rotation: 0,
    velocity: new THREE.Vector3(),
    radius: radius || 0.1
  });
  components.bullet.set(id, {
    direction: direction.clone().normalize(),
    speed,
    damage,
    owner,
    lifetime: 3,
    aoe: aoe || 0
  });

  return id;
}

// ============================================================
// 5b. POWER-UPS
// ============================================================
const POWERUP_COLORS = { health: 0x44ff44, shield: 0x4488ff, speed: 0xffaa00, rapidfire: 0xff44ff };

function spawnPowerup(x, z) {
  const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  const id = nextEntityId++;
  entities.add(id);
  powerupEntities.add(id);

  const color = POWERUP_COLORS[type];
  const group = new THREE.Group();

  // Base ring
  const ringGeo = new THREE.TorusGeometry(0.5, 0.1, 6, 12);
  const ringMat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.3, roughness: 0.3, metalness: 0.5 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  group.add(ring);

  // Icon sphere
  const sphereGeo = new THREE.OctahedronGeometry(0.25);
  const sphereMat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.5 });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  sphere.position.y = 0.6;
  group.add(sphere);

  // Point light
  const light = new THREE.PointLight(color, 0.5, 5);
  light.position.y = 0.5;
  group.add(light);

  group.position.set(x, 0.3, z);
  scene.add(group);

  components.mesh.set(id, group);
  components.transform.set(id, { position: new THREE.Vector3(x, 0.3, z), rotation: 0, velocity: new THREE.Vector3(), radius: 0.8 });
  // Store powerup type as a custom component
  components.destructible.set(id, { type: 'powerup', powerupType: type });

  return id;
}

function updatePowerups(dt) {
  // Rotate and bob powerups
  powerupEntities.forEach(id => {
    const mesh = components.mesh.get(id);
    if (mesh) {
      mesh.rotation.y += dt * 2;
      mesh.position.y = 0.3 + Math.sin(Date.now() * 0.003) * 0.15;
    }
  });

  // Check player collection
  if (!playerEntityId || !components.transform.has(playerEntityId)) return;
  const playerTr = components.transform.get(playerEntityId);

  powerupEntities.forEach(id => {
    const puTr = components.transform.get(id);
    if (!puTr) return;
    const dist = playerTr.position.distanceTo(puTr.position);
    if (dist < 1.5) {
      const pu = components.destructible.get(id);
      if (pu && pu.type === 'powerup') {
        applyPowerup(pu.powerupType);
        powerupEntities.delete(id);
        destroyEntity(id);
        playSound('powerup');
      }
    }
  });

  // Tick down temporary buffs
  for (const key of ['shield', 'speed', 'rapidfire']) {
    if (activePowerups[key] > 0) {
      activePowerups[key] -= dt;
      if (activePowerups[key] <= 0) activePowerups[key] = 0;
    }
  }
}

function applyPowerup(type) {
  switch(type) {
    case 'health': {
      const h = components.health.get(playerEntityId);
      if (h) h.current = Math.min(h.max, h.current + 40);
      break;
    }
    case 'shield': activePowerups.shield = POWERUP_DURATION; break;
    case 'speed': activePowerups.speed = POWERUP_DURATION; break;
    case 'rapidfire': activePowerups.rapidfire = POWERUP_DURATION; break;
  }
}

function addPowerupSound() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(g).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.2);
  } catch(e) {}
}

// Spawn powerups when wave starts
function spawnWavePowerups() {
  // 2-3 powerups per wave
  const count = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < count; i++) {
    const x = (Math.random() - 0.5) * (MAP_SIZE - 10);
    const z = (Math.random() - 0.5) * (MAP_SIZE - 10);
    // Don't spawn too close to center or walls
    if (Math.abs(x) < 3 && Math.abs(z) < 3) continue;
    spawnPowerup(x, z);
  }
}

// ============================================================
// 5c. WEATHER SYSTEM
// ============================================================
const WEATHER_EFFECTS = {
  clear:     { fogNear: 80, fogFar: 120, fogColor: 0x87919a, visibility: 1,   groundColor: 0x8b7d5e, skyColor: 0x87919a, label: '' },
  sandstorm: { fogNear: 20, fogFar: 45,  fogColor: 0xc4a35a, visibility: 0.5, groundColor: 0xa89060, skyColor: 0xc4a35a, label: 'SANDSTORM' },
  rain:      { fogNear: 35, fogFar: 70,  fogColor: 0x667788, visibility: 0.7, groundColor: 0x6a6a5e, skyColor: 0x556677, label: 'RAIN' },
  fog:       { fogNear: 15, fogFar: 35,  fogColor: 0x999988, visibility: 0.4, groundColor: 0x8a8a7e, skyColor: 0x999988, label: 'FOG' },
};

function changeWeather() {
  // Pick weather based on wave — more extreme at higher waves
  const roll = Math.random();
  if (currentWave <= 2) {
    currentWeather = 'clear';
  } else if (roll < 0.35) {
    currentWeather = 'clear';
  } else if (roll < 0.55) {
    currentWeather = 'sandstorm';
  } else if (roll < 0.75) {
    currentWeather = 'rain';
  } else if (roll < 0.90) {
    currentWeather = 'fog';
  } else {
    currentWeather = 'clear';
  }

  const effect = WEATHER_EFFECTS[currentWeather];

  // Update scene fog
  scene.fog.near = effect.fogNear;
  scene.fog.far = effect.fogFar;
  scene.fog.color.setHex(effect.fogColor);
  scene.background.setHex(effect.skyColor);

  // Update ground color
  scene.traverse(child => {
    if (child.geometry && child.geometry.type === 'PlaneGeometry' && child.material.color) {
      child.material.color.setHex(effect.groundColor);
    }
  });

  // Show weather indicator
  const indicator = document.getElementById('weather-indicator');
  if (effect.label) {
    indicator.textContent = effect.label + (currentWeather === 'sandstorm' ? ' — reduced visibility' : currentWeather === 'fog' ? ' — low visibility' : '');
    indicator.classList.add('visible');
    setTimeout(() => indicator.classList.remove('visible'), 3000);
  }

  // Clear old weather particles
  clearWeatherParticles();

  // Start rain audio
  if (currentWeather === 'rain') {
    startRainSound();
  } else {
    stopRainSound();
  }

  // Adjust enemy detect range based on visibility
  weatherTimer = 0;
}

function clearWeatherParticles() {
  weatherParticles.forEach(p => {
    scene.remove(p.mesh);
    if (p.mesh.geometry) p.mesh.geometry.dispose();
    if (p.mesh.material) p.mesh.material.dispose();
  });
  weatherParticles = [];
}

function updateWeather(dt) {
  if (currentWeather === 'sandstorm') {
    updateSandstorm(dt);
  } else if (currentWeather === 'rain') {
    updateRain(dt);
  } else if (currentWeather === 'fog') {
    updateFogEffect(dt);
  }
}

function updateSandstorm(dt) {
  // Spawn sand particles
  if (weatherParticles.length < 150 && Math.random() < 0.5) {
    const geo = new THREE.PlaneGeometry(0.3, 0.3);
    const mat = new THREE.MeshBasicMaterial({ color: 0xc4a35a, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geo, mat);
    const px = (Math.random() - 0.5) * 60;
    const py = Math.random() * 5;
    const pz = (Math.random() - 0.5) * 60;
    mesh.position.set(px, py, pz);
    scene.add(mesh);
    weatherParticles.push({ mesh, lifetime: 3, age: 0 });
  }

  // Move sand particles with wind
  weatherParticles.forEach(p => {
    p.age += dt;
    p.mesh.position.x += 12 * dt;
    p.mesh.position.y += (Math.random() - 0.5) * 2 * dt;
    p.mesh.rotation.z = Math.random() * 0.1;
    if (p.age > p.lifetime) {
      p.mesh.position.x = -30 + Math.random() * 5;
      p.mesh.position.z = (Math.random() - 0.5) * 60;
      p.age = 0;
    }
  });
}

function updateRain(dt) {
  // Spawn rain drops
  if (weatherParticles.length < 200 && Math.random() < 0.8) {
    const geo = new THREE.CylinderGeometry(0.01, 0.01, 0.4, 3);
    const mat = new THREE.MeshBasicMaterial({ color: 0xaabbcc, transparent: true, opacity: 0.4 });
    const mesh = new THREE.Mesh(geo, mat);
    const px = (Math.random() - 0.5) * 60;
    const pz = (Math.random() - 0.5) * 60;
    mesh.position.set(px, 8 + Math.random() * 5, pz);
    scene.add(mesh);
    weatherParticles.push({ mesh, lifetime: 2, age: 0 });
  }

  weatherParticles.forEach(p => {
    p.age += dt;
    p.mesh.position.y -= 15 * dt;
    if (p.mesh.position.y < 0 || p.age > p.lifetime) {
      p.mesh.position.y = 8 + Math.random() * 5;
      p.mesh.position.x = (Math.random() - 0.5) * 60;
      p.mesh.position.z = (Math.random() - 0.5) * 60;
      p.age = 0;
    }
  });
}

function updateFogEffect(dt) {
  // Fog doesn't need particles — just the scene fog density (already set)
  // But add subtle ground mist
  if (weatherParticles.length < 30 && Math.random() < 0.1) {
    const geo = new THREE.PlaneGeometry(3 + Math.random() * 3, 3 + Math.random() * 3);
    const mat = new THREE.MeshBasicMaterial({ color: 0x999988, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set((Math.random() - 0.5) * 50, 0.3 + Math.random() * 0.5, (Math.random() - 0.5) * 50);
    mesh.rotation.x = -Math.PI / 2;
    scene.add(mesh);
    weatherParticles.push({ mesh, lifetime: 6, age: 0 });
  }

  weatherParticles.forEach(p => {
    p.age += dt;
    p.mesh.position.x += (Math.random() - 0.5) * dt;
    p.mesh.material.opacity = 0.15 * (1 - p.age / p.lifetime);
    if (p.age > p.lifetime) {
      p.mesh.position.set((Math.random() - 0.5) * 50, 0.3 + Math.random() * 0.5, (Math.random() - 0.5) * 50);
      p.age = 0;
      p.mesh.material.opacity = 0.15;
    }
  });
}

function startRainSound() {
  if (rainAudioNode) return;
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.02;
    rainAudioNode = ctx.createBufferSource();
    rainAudioNode.buffer = buf;
    rainAudioNode.loop = true;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2000;
    filter.Q.value = 0.5;
    rainGainNode = ctx.createGain();
    rainGainNode.gain.value = 0.06;
    rainAudioNode.connect(filter).connect(rainGainNode).connect(ctx.destination);
    rainAudioNode.start();
  } catch(e) {}
}

function stopRainSound() {
  if (rainAudioNode) {
    try {
      rainAudioNode.stop();
      rainAudioNode.disconnect();
      rainGainNode.disconnect();
    } catch(e) {}
    rainAudioNode = null;
    rainGainNode = null;
  }
}

// Get effective visibility multiplier for AI
function getWeatherVisibility() {
  return WEATHER_EFFECTS[currentWeather].visibility;
}

// 6. PARTICLES
// ============================================================
function spawnExplosion(position, count, color, speed, lifetime) {
  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
    const geo = new THREE.SphereGeometry(0.08 + Math.random() * 0.1, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    scene.add(mesh);

    particles.push({
      mesh,
      velocity: new THREE.Vector3(
        (Math.random() - 0.5) * speed,
        Math.random() * speed * 0.7 + 1,
        (Math.random() - 0.5) * speed
      ),
      lifetime,
      age: 0
    });
  }
}

function spawnMuzzleFlash(position) {
  spawnExplosion(position, 5, 0xffcc44, 3, 0.2);
}

function spawnDestruction(position, type) {
  const color = type === 'barrel' ? 0xff6622 : 0x8b7355;
  const count = type === 'barrel' ? 30 : 15;
  spawnExplosion(position, count, color, 5, 0.8);

  // Add debris chunks
  for (let i = 0; i < 6 && particles.length < MAX_PARTICLES; i++) {
    const size = 0.15 + Math.random() * 0.2;
    const geo = new THREE.BoxGeometry(size, size, size);
    const mat = new THREE.MeshStandardMaterial({ color: type === 'barrel' ? 0x663311 : 0x7a6a4a, roughness: 0.9 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    mesh.position.y += 0.5;
    scene.add(mesh);
    particles.push({
      mesh,
      velocity: new THREE.Vector3(
        (Math.random() - 0.5) * 6,
        Math.random() * 5 + 2,
        (Math.random() - 0.5) * 6
      ),
      lifetime: 1.5,
      age: 0,
      gravity: true
    });
  }
}

function spawnDustTrail(position) {
  if (particles.length >= MAX_PARTICLES - 5) return;
  const geo = new THREE.SphereGeometry(0.1, 4, 4);
  const mat = new THREE.MeshBasicMaterial({ color: 0x9a8a6a, transparent: true, opacity: 0.4 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(position.x + (Math.random()-0.5)*0.5, 0.1, position.z + (Math.random()-0.5)*0.5);
  scene.add(mesh);
  particles.push({
    mesh,
    velocity: new THREE.Vector3((Math.random()-0.5)*0.5, 0.3, (Math.random()-0.5)*0.5),
    lifetime: 0.6,
    age: 0
  });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt;
    if (p.age >= p.lifetime) {
      scene.remove(p.mesh);
      if (p.mesh.geometry) p.mesh.geometry.dispose();
      if (p.mesh.material) p.mesh.material.dispose();
      particles.splice(i, 1);
      continue;
    }
    p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
    if (p.gravity) {
      p.velocity.y -= 9.8 * dt;
      if (p.mesh.position.y < 0.05) {
        p.mesh.position.y = 0.05;
        p.velocity.y *= -0.3;
        p.velocity.x *= 0.7;
        p.velocity.z *= 0.7;
      }
    }
    const alpha = 1 - p.age / p.lifetime;
    p.mesh.material.opacity = alpha;
    p.mesh.scale.setScalar(alpha);
  }
}

// Kill streak display
function showKillStreak(count) {

// Minimap drawing
function drawMinimap() {
  const canvas = document.getElementById('minimap');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const scale = w / MAP_SIZE;

  ctx.fillStyle = 'rgba(30,30,20,0.8)';
  ctx.fillRect(0, 0, w, h);

  // Walls
  components.destructible.forEach((d, id) => {
    const tr = components.transform.get(id);
    if (!tr) return;
    const mx = (tr.position.x + HALF_MAP) * scale;
    const mz = (tr.position.z + HALF_MAP) * scale;
    if (d.type === 'concrete') {
      ctx.fillStyle = '#666';
    } else if (d.type === 'wall') {
      ctx.fillStyle = '#8a6a4a';
    } else {
      ctx.fillStyle = '#cc3322';
    }
    ctx.fillRect(mx - 1, mz - 1, 2, 2);
  });

  // Enemies
  components.enemyAI.forEach((ai, id) => {
    const tr = components.transform.get(id);
    if (!tr) return;
    const mx = (tr.position.x + HALF_MAP) * scale;
    const mz = (tr.position.z + HALF_MAP) * scale;
    ctx.fillStyle = '#ff6644';
    ctx.beginPath();
    ctx.arc(mx, mz, 2.5, 0, Math.PI * 2);
    ctx.fill();
  });

  // Player
  if (playerEntityId && components.transform.has(playerEntityId)) {
    const pTr = components.transform.get(playerEntityId);
    const mx = (pTr.position.x + HALF_MAP) * scale;
    const mz = (pTr.position.z + HALF_MAP) * scale;
    ctx.fillStyle = '#44ff44';
    ctx.beginPath();
    ctx.arc(mx, mz, 3, 0, Math.PI * 2);
    ctx.fill();
    // Direction indicator
    ctx.strokeStyle = '#44ff44';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mx, mz);
    ctx.lineTo(mx + Math.sin(pTr.rotation) * 6, mz + Math.cos(pTr.rotation) * 6);
    ctx.stroke();
  }
}

}

function onResize() {

// --- Weapon Switch ---
function switchWeapon(idx) {
  if (idx === currentWeapon) return;
  currentWeapon = idx;
  document.querySelectorAll('.weapon-slot').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  // Reset reload
  const ctrl = components.tankControl.get(playerEntityId);
  if (ctrl) ctrl.lastFired = 0;
}

// --- Player System ---
function updatePlayer(dt) {
  if (gameState !== 'playing') return;
  const ctrl = components.tankControl.get(playerEntityId);
  const tr = components.transform.get(playerEntityId);
  const mesh = components.mesh.get(playerEntityId);
  if (!ctrl || !tr || !mesh) return;

  // Movement
  let moveX = 0, moveZ = 0;
  if (keys['KeyW'] || keys['ArrowUp']) moveZ -= 1;
  if (keys['KeyS'] || keys['ArrowDown']) moveZ += 1;
  if (keys['KeyA'] || keys['ArrowLeft']) moveX -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) moveX += 1;

  if (moveX !== 0 || moveZ !== 0) {
    isPlayerMoving = true;
    const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
    moveX /= len;
    moveZ /= len;
    const speedMult = activePowerups.speed > 0 ? 1.6 : 1;
    tr.position.x += moveX * ctrl.speed * speedMult * dt;
    tr.position.z += moveZ * ctrl.speed * speedMult * dt;

    // Rotate body toward movement direction
    const targetRot = Math.atan2(moveX, moveZ);
    let diff = targetRot - tr.rotation;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    tr.rotation += diff * Math.min(1, dt * 8);

    // Dust trail
    if (Math.random() < 0.3) spawnDustTrail(tr.position);
    // Tread sound
    if (Math.random() < 0.08) playTreadSound();
  } else {
    isPlayerMoving = false;
  }

  // Collision with walls
  resolveWallCollisions(playerEntityId, tr);

  // Collision with other tanks
  resolveTankCollisions(playerEntityId, tr);

  // Clamp to map
  tr.position.x = Math.max(-HALF_MAP + 1.2, Math.min(HALF_MAP - 1.2, tr.position.x));
  tr.position.z = Math.max(-HALF_MAP + 1.2, Math.min(HALF_MAP - 1.2, tr.position.z));

  mesh.position.set(tr.position.x, 0, tr.position.z);
  mesh.rotation.y = tr.rotation;

  // Turret aim at mouse
  const turret = components.turretMesh.get(playerEntityId);
  if (turret) {
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(mouse.x, mouse.y), camera);
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const intersect = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersect);
    if (intersect) {
      const dx = intersect.x - tr.position.x;
      const dz = intersect.z - tr.position.z;
      const turretAngle = Math.atan2(dx, dz);
      turret.rotation.y = turretAngle - tr.rotation;
    }
  }

  // Fire
  const w = WEAPONS[currentWeapon];
  const rapidMult = activePowerups.rapidfire > 0 ? 0.4 : 1;
  const upgradeReloadMult = 1 - upgrades.reload.level * 0.10;
  const reloadTime = w.reload * rapidMult * upgradeReloadMult;
  ctrl.lastFired += dt;
  if (mouse.down && ctrl.lastFired >= reloadTime) {
    fireBullet(playerEntityId);
    ctrl.lastFired = 0;
  }
}

// --- Fire Bullet ---
function fireBullet(tankId) {
  const tr = components.transform.get(tankId);
  const tip = components.barrelTip.get(tankId);
  const turret = components.turretMesh.get(tankId);
  const ctrl = components.tankControl.get(tankId);
  if (!tr || !tip || !turret || !ctrl) return;

  // Get world position of barrel tip
  const tipWorld = new THREE.Vector3();
  tip.getWorldPosition(tipWorld);

  // Direction: turret world rotation
  const bodyRot = tr.rotation;
  const turretLocal = turret.rotation.y;
  const worldAngle = bodyRot + turretLocal;
  const direction = new THREE.Vector3(Math.sin(worldAngle), 0, Math.cos(worldAngle));

  const isPlayer = ctrl.type === 'player';
  let speed, damage, bulletColor, bulletRadius, aoe, reloadTime, soundType;

  if (isPlayer) {
    const w = WEAPONS[currentWeapon];
    const rapidMult = activePowerups.rapidfire > 0 ? 0.4 : 1;
    reloadTime = w.reload * rapidMult;
    speed = w.speed;
    damage = Math.round(w.damage * (1 + upgrades.firepower.level * 0.15));
    bulletColor = w.color;
    bulletRadius = w.radius;
    aoe = w.aoe;
    soundType = currentWeapon === 2 ? 'rocketExplode' : 'fire';
  } else {
    speed = ENEMY_BULLET_SPEED;
    damage = ENEMY_BULLET_DAMAGE;
    bulletColor = 0xffcc44;
    bulletRadius = 0.10;
    aoe = 0;
    soundType = 'fire';
  }

  createBullet(tipWorld, direction, speed, damage, tankId, bulletColor, bulletRadius, aoe);
  spawnMuzzleFlash(tipWorld);
  playSound('fire');
}

// --- AI System ---
function updateAI(dt) {
  if (gameState !== 'playing') return;
  const playerTr = components.transform.get(playerEntityId);
  if (!playerTr) return;

  components.enemyAI.forEach((ai, id) => {
    const tr = components.transform.get(id);
    const ctrl = components.tankControl.get(id);
    const mesh = components.mesh.get(id);
    const turret = components.turretMesh.get(id);
    if (!tr || !ctrl || !mesh) return;

    const distToPlayer = tr.position.distanceTo(playerTr.position);
    const visMult = getWeatherVisibility();
    const effectiveDetectRange = ENEMY_DETECT_RANGE * visMult;
    const effectiveFireRange = ENEMY_FIRE_RANGE * visMult;

    // State transitions
    if (distToPlayer < effectiveDetectRange) {
      ai.state = 'chase';
    } else if (ai.state === 'chase' && distToPlayer > effectiveDetectRange * 1.5) {
      ai.state = 'patrol';
    }

    let moveTarget = null;

    if (ai.state === 'patrol') {
      moveTarget = ai.targetPos;
      ai.patrolTimer -= dt;
      if (ai.patrolTimer <= 0 || tr.position.distanceTo(ai.targetPos) < 2) {
        ai.targetPos = new THREE.Vector3(
          (Math.random() - 0.5) * (MAP_SIZE - 10),
          0,
          (Math.random() - 0.5) * (MAP_SIZE - 10)
        );
        ai.patrolTimer = Math.random() * 4 + 2;
      }
    } else {
      // Chase — move toward player but stop at fire range
      if (distToPlayer > effectiveFireRange * 0.6) {
        moveTarget = playerTr.position;
      }
    }

    // Move toward target
    if (moveTarget) {
      const dx = moveTarget.x - tr.position.x;
      const dz = moveTarget.z - tr.position.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist > 0.5) {
        const nx = dx / dist;
        const nz = dz / dist;
        tr.position.x += nx * ctrl.speed * dt;
        tr.position.z += nz * ctrl.speed * dt;

        const targetRot = Math.atan2(nx, nz);
        let diff = targetRot - tr.rotation;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        tr.rotation += diff * Math.min(1, dt * 5);

        if (Math.random() < 0.15) spawnDustTrail(tr.position);
      }
    }

    // Wall collision
    resolveWallCollisions(id, tr);
    // Tank collision
    resolveTankCollisions(id, tr);
    tr.position.x = Math.max(-HALF_MAP + 1.2, Math.min(HALF_MAP - 1.2, tr.position.x));
    tr.position.z = Math.max(-HALF_MAP + 1.2, Math.min(HALF_MAP - 1.2, tr.position.z));

    mesh.position.set(tr.position.x, 0, tr.position.z);
    mesh.rotation.y = tr.rotation;

    // Turret aim at player
    if (turret) {
      const dx = playerTr.position.x - tr.position.x;
      const dz = playerTr.position.z - tr.position.z;
      const aimAngle = Math.atan2(dx, dz);
      turret.rotation.y = aimAngle - tr.rotation;
    }

    // Fire at player
    ctrl.lastFired += dt;
    if (ai.state === 'chase' && distToPlayer < effectiveFireRange && ctrl.lastFired >= ctrl.reloadTime) {
      // Check if roughly facing player
      const aimDx = playerTr.position.x - tr.position.x;
      const aimDz = playerTr.position.z - tr.position.z;
      const aimAngle = Math.atan2(aimDx, aimDz);
      let angleDiff = aimAngle - tr.rotation;
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      if (Math.abs(angleDiff) < Math.PI * 0.6) {
        fireBullet(id);
        ctrl.lastFired = 0;
      }
    }
  });
}

// --- Wall Collision ---
function resolveWallCollisions(entityId, tr) {
  const checkRadius = 1.2;
  const gx = Math.round(tr.position.x + HALF_MAP);
  const gz = Math.round(tr.position.z + HALF_MAP);

  for (let dx = -2; dx <= 2; dx++) {
    for (let dz = -2; dz <= 2; dz++) {
      const cx = gx + dx;
      const cz = gz + dz;
      if (cx < 0 || cx >= MAP_SIZE || cz < 0 || cz >= MAP_SIZE) continue;
      const wallId = mapGrid[cx][cz];
      if (!wallId || wallId === entityId) continue;

      const wallTr = components.transform.get(wallId);
      if (!wallTr) continue;

      const wx = wallTr.position.x;
      const wz = wallTr.position.z;
      const ddx = tr.position.x - wx;
      const ddz = tr.position.z - wz;
      const dist = Math.sqrt(ddx * ddx + ddz * ddz);
      const minDist = (tr.radius || 0.8) + (wallTr.radius || 0.5);

      if (dist < minDist && dist > 0.001) {
        const overlap = minDist - dist;
        tr.position.x += (ddx / dist) * overlap;
        tr.position.z += (ddz / dist) * overlap;
      }
    }
  }
}

// --- Tank-Tank Collision ---
function resolveTankCollisions(entityId, tr) {
  components.tankControl.forEach((otherCtrl, otherId) => {
    if (otherId === entityId) return;
    const otherTr = components.transform.get(otherId);
    if (!otherTr) return;

    const ddx = tr.position.x - otherTr.position.x;
    const ddz = tr.position.z - otherTr.position.z;
    const dist = Math.sqrt(ddx * ddx + ddz * ddz);
    const minDist = (tr.radius || 1.0) + (otherTr.radius || 1.0);

    if (dist < minDist && dist > 0.001) {
      const overlap = (minDist - dist) / 2;
      const nx = ddx / dist;
      const nz = ddz / dist;
      // Push current entity away
      tr.position.x += nx * overlap;
      tr.position.z += nz * overlap;
      // Push other entity away
      otherTr.position.x -= nx * overlap;
      otherTr.position.z -= nz * overlap;
      // Update other entity's mesh position
      const otherMesh = components.mesh.get(otherId);
      if (otherMesh) {
        otherMesh.position.set(otherTr.position.x, 0, otherTr.position.z);
      }
    }
  });
}

// --- Combat System ---
function lineCircleIntersect(ax, az, bx, bz, cx, cz, r) {
  // Check if line segment AB intersects circle at C with radius r
  const dx = bx - ax, dz = bz - az;
  const fx = ax - cx, fz = az - cz;
  const a = dx * dx + dz * dz;
  const b = 2 * (fx * dx + fz * dz);
  const c = fx * fx + fz * fz - r * r;
  let disc = b * b - 4 * a * c;
  if (disc < 0) return false;
  disc = Math.sqrt(disc);
  const t1 = (-b - disc) / (2 * a);
  const t2 = (-b + disc) / (2 * a);
  return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1);
}

function updateCombat(dt) {
  if (gameState !== 'playing') return;

  const toDestroy = [];

  components.bullet.forEach((bullet, id) => {
    const tr = components.transform.get(id);
    const mesh = components.mesh.get(id);
    if (!tr || !mesh) return;

    // Store old position for swept collision
    const oldX = tr.position.x;
    const oldZ = tr.position.z;

    // Move bullet
    tr.position.x += bullet.direction.x * bullet.speed * dt;
    tr.position.z += bullet.direction.z * bullet.speed * dt;
    mesh.position.copy(tr.position);

    bullet.lifetime -= dt;

    // Out of bounds or expired
    if (bullet.lifetime <= 0 || Math.abs(tr.position.x) > HALF_MAP || Math.abs(tr.position.z) > HALF_MAP) {
      toDestroy.push(id);
      return;
    }

    // Swept collision check — test line segment from old to new position
    let hit = false;
    components.transform.forEach((otherTr, otherId) => {
      if (hit || otherId === id || otherId === bullet.owner) return;
      // Don't hit same type (enemy bullets don't hit enemies)
      const ownerCtrl = components.tankControl.get(bullet.owner);
      const otherCtrl = components.tankControl.get(otherId);
      if (ownerCtrl && otherCtrl && ownerCtrl.type === otherCtrl.type) return;

      const hitDist = (tr.radius || 0.1) + (otherTr.radius || 0.8);

      // Check swept collision (line-circle)
      const collided = lineCircleIntersect(
        oldX, oldZ, tr.position.x, tr.position.z,
        otherTr.position.x, otherTr.position.z, hitDist
      );

      // Also check point distance as fallback
      const dist = tr.position.distanceTo(otherTr.position);

      if (collided || dist < hitDist) {
        hit = true;
        playSound('hit');

        // Apply damage
        const health = components.health.get(otherId);
        const destructible = components.destructible.get(otherId);
        if (health) {
          let dmg = bullet.damage;
          // Shield reduces damage to player
          if (otherId === playerEntityId && activePowerups.shield > 0) {
            dmg = Math.round(dmg * 0.3);
          }
          health.current -= dmg;
          playSound('tankHit');
          spawnDamageNumber(otherTr.position, dmg, dmg >= 50);

          // AoE on impact (rocket)
          if (bullet.aoe > 0) {
            applyAreaDamage(otherTr.position, bullet.aoe, bullet.damage * 0.5, bullet.owner);
            spawnExplosion(otherTr.position, 30, 0xff4400, 7, 0.8);
            playSound('rocketExplode');
          }
          if (health.current <= 0) {
            // Destroy tank
            if (otherCtrl && otherCtrl.type === 'enemy') {
              score += 100;
              scrap += 10 + currentWave * 2;
              waveEnemiesAlive--;
              killStreak++;
              showKillStreak(killStreak);
              spawnExplosion(otherTr.position, 25, 0xff6622, 6, 1.0);
              spawnExplosion(otherTr.position, 25, 0xff6622, 6, 1.0);
              spawnExplosion(otherTr.position, 10, 0x333333, 4, 1.5);
              playSound('explosion');
              toDestroy.push(otherId);
            } else if (otherId === playerEntityId) {
              // Player died
              spawnExplosion(otherTr.position, 30, 0xff4400, 7, 1.2);
              playSound('explosion');
              toDestroy.push(otherId);
              gameOver();
            }
          }
        } else if (destructible && destructible.type !== 'concrete') {
          destructible.hp--;
          const otherMesh = components.mesh.get(otherId);
          if (otherMesh && destructible.type === 'wall') {
            const dmgRatio = 1 - destructible.hp / destructible.maxHp;
            otherMesh.material.color.setHex(
              dmgRatio > 0.5 ? 0x5a4a3a : 0x7a6a4a
            );
          }
          if (destructible.hp <= 0) {
            if (destructible.type === 'barrel') {
              spawnExplosion(otherTr.position, 40, 0xff4400, 8, 1.0);
              spawnExplosion(otherTr.position, 15, 0xffaa00, 5, 0.6);
              playSound('barrelExplode');
              applyAreaDamage(otherTr.position, BARREL_EXPLOSION_RADIUS, BARREL_EXPLOSION_DAMAGE, bullet.owner);
            } else {
              spawnDestruction(otherTr.position, 'wall');
              playSound('wallBreak');
            }
            const gx = Math.round(otherTr.position.x + HALF_MAP);
            const gz = Math.round(otherTr.position.z + HALF_MAP);
            if (gx >= 0 && gx < MAP_SIZE && gz >= 0 && gz < MAP_SIZE) {
              mapGrid[gx][gz] = 0;
            }
            spawnRubble(otherTr.position);
            toDestroy.push(otherId);
          }
        } else if (destructible && destructible.type === 'concrete') {
          spawnExplosion(tr.position, 3, 0xcccccc, 2, 0.3);
          playSound('ricochet');
        }
        toDestroy.push(id);
      }
    });
  });

  // Remove destroyed entities
  const uniqueDestroy = [...new Set(toDestroy)];
  uniqueDestroy.forEach(id => destroyEntity(id));
}

function applyAreaDamage(center, radius, damage, sourceId) {
  components.health.forEach((health, id) => {
    const tr = components.transform.get(id);
    if (!tr) return;
    const dist = center.distanceTo(tr.position);
    if (dist < radius) {
      const falloff = 1 - dist / radius;
      health.current -= Math.round(damage * falloff);
      if (health.current <= 0) {
        const ctrl = components.tankControl.get(id);
        if (ctrl && ctrl.type === 'enemy') {
          score += 100;
          scrap += 10 + currentWave * 2;
          waveEnemiesAlive--;
          spawnExplosion(tr.position, 25, 0xff6622, 6, 1.0);
          destroyEntity(id);
        } else if (id === playerEntityId) {
          spawnExplosion(tr.position, 30, 0xff4400, 7, 1.2);
          destroyEntity(id);
          gameOver();
        }
      }
    }
  });
}

function spawnRubble(position) {
  const geo = new THREE.BoxGeometry(0.9, 0.15, 0.9);
  const mat = new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.95 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(position.x, 0.075, position.z);
  mesh.receiveShadow = true;
  scene.add(mesh);
  // Static decoration — not an entity, just visual
}

function destroyEntity(id) {
  entities.delete(id);
  const mesh = components.mesh.get(id);
  if (mesh) {
    scene.remove(mesh);
    mesh.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
  }
  components.mesh.delete(id);
  components.transform.delete(id);
  components.health.delete(id);
  components.tankControl.delete(id);
  components.bullet.delete(id);
  components.destructible.delete(id);
  components.enemyAI.delete(id);
  components.turretMesh.delete(id);
  components.barrelTip.delete(id);
}

// --- Wave System ---
function updateWaves(dt) {
  if (gameState !== 'playing') return;

  if (waveEnemiesAlive <= 0 && waveSpawned) {
    // Wave complete
    score += currentWave * 50;
    scrap += 20 + currentWave * 5;
    waveSpawned = false;
    killStreak = 0;
    currentWave++;
    // Open upgrade shop
    openShop();
  }

  if (waveTimer > 0) {
    waveTimer -= dt;
    if (waveTimer <= 0) {
      announceWave(currentWave);
      spawnWave(currentWave);
      spawnWavePowerups();
      changeWeather();
    }
  }
}

function spawnWave(wave) {
  const enemyCount = 3 + (wave - 1) * 2;
  waveEnemiesAlive = enemyCount;
  waveEnemyTotal = enemyCount;

  for (let i = 0; i < enemyCount; i++) {
    // Spawn on map edges, away from player
    let x, z;
    const side = Math.floor(Math.random() * 4);
    switch(side) {
      case 0: x = -HALF_MAP + 3; z = (Math.random() - 0.5) * (MAP_SIZE - 10); break;
      case 1: x = HALF_MAP - 3; z = (Math.random() - 0.5) * (MAP_SIZE - 10); break;
      case 2: z = -HALF_MAP + 3; x = (Math.random() - 0.5) * (MAP_SIZE - 10); break;
      case 3: z = HALF_MAP - 3; x = (Math.random() - 0.5) * (MAP_SIZE - 10); break;
    }
    createTank(x, z, 'enemy');
  }
  waveSpawned = true;
}

function announceWave(wave) {
  const el = document.getElementById('wave-announce');
  el.textContent = 'WAVE ' + wave;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 2000);
}

// ============================================================
// 9b. UPGRADE SHOP
// ============================================================
function getUpgradeCost(key) {
  const u = upgrades[key];
  return Math.round(u.baseCost * Math.pow(u.costMult, u.level));
}

function openShop() {
  shopOpen = true;
  shopTimer = 15;
  gameState = 'shop';
  document.getElementById('shop-overlay').classList.add('visible');
  document.body.style.cursor = 'default';
  renderShop();

  document.getElementById('shop-continue').onclick = closeShop;
}

function closeShop() {
  shopOpen = false;
  document.getElementById('shop-overlay').classList.remove('visible');
  document.body.style.cursor = 'none';
  gameState = 'playing';
  // Apply upgrades to player
  applyUpgrades();
  // Start next wave
  announceWave(currentWave);
  spawnWave(currentWave);
  spawnWavePowerups();
}

function renderShop() {
  document.getElementById('shop-scrap').textContent = 'Scrap: ' + scrap;
  const container = document.getElementById('shop-items');
  while (container.firstChild) container.removeChild(container.firstChild);

  Object.keys(upgrades).forEach(key => {
    const u = upgrades[key];
    const cost = getUpgradeCost(key);
    const canBuy = u.level < u.maxLevel && scrap >= cost;

    const item = document.createElement('div');
    item.className = 'shop-item' + (canBuy ? '' : ' disabled');

    const header = document.createElement('div');
    header.className = 'item-header';

    const name = document.createElement('span');
    name.className = 'item-name';
    name.textContent = u.label;

    const costEl = document.createElement('span');
    costEl.className = 'item-cost';
    costEl.textContent = u.level >= u.maxLevel ? 'MAX' : cost + ' scrap';

    header.appendChild(name);
    header.appendChild(costEl);

    const desc = document.createElement('div');
    desc.className = 'item-desc';
    desc.textContent = u.desc;

    const level = document.createElement('div');
    level.className = 'item-level';
    level.textContent = 'Level ' + u.level + '/' + u.maxLevel + '  ' + '■'.repeat(u.level) + '□'.repeat(u.maxLevel - u.level);

    item.appendChild(header);
    item.appendChild(desc);
    item.appendChild(level);

    if (canBuy) {
      item.addEventListener('click', () => {
        scrap -= cost;
        u.level++;
        playSound('powerup');
        renderShop();
      });
    }

    container.appendChild(item);
  });
}

function updateShopTimer(dt) {
  if (!shopOpen) return;
  shopTimer -= dt;
  document.getElementById('shop-timer').textContent = 'Auto-deploy in ' + Math.ceil(shopTimer) + 's...';
  if (shopTimer <= 0) closeShop();
}

function applyUpgrades() {
  if (!playerEntityId) return;
  const ctrl = components.tankControl.get(playerEntityId);
  const health = components.health.get(playerEntityId);
  if (!ctrl || !health) return;

  // Armor: +20 max HP per level, refill to new max
  const newMax = PLAYER_HP + upgrades.armor.level * 20;
  health.max = newMax;
  health.current = Math.min(health.current + 20, newMax); // heal on upgrade

  // Speed: +8% per level
  ctrl.speed = PLAYER_SPEED * (1 + upgrades.speed.level * 0.08);

  // Firepower: already handled in fireBullet via WEAPONS damage

  // Reload: -10% per level (applied via weapon)
  // Handled dynamically in the fire rate calculation
}

// --- Camera System ---
const cameraOffset = new THREE.Vector3(-12, 18, 12);
const cameraLookOffset = new THREE.Vector3(0, 0, -2);

function updateCamera(dt) {
  if (!playerEntityId || !components.transform.has(playerEntityId)) return;
  const playerTr = components.transform.get(playerEntityId);

  const targetPos = new THREE.Vector3(
    playerTr.position.x + cameraOffset.x,
    cameraOffset.y,
    playerTr.position.z + cameraOffset.z
  );

  camera.position.lerp(targetPos, Math.min(1, dt * 5));

  const lookAt = new THREE.Vector3(
    playerTr.position.x + cameraLookOffset.x,
    cameraLookOffset.y,
    playerTr.position.z + cameraLookOffset.z
  );
  camera.lookAt(lookAt);
}

// --- HUD Update ---
let minimapCounter = 0;
function updateHUD() {
  const health = components.health.get(playerEntityId);
  if (health) {
    const pct = Math.max(0, health.current / health.max) * 100;
    const bar = document.getElementById('health-bar');
    bar.style.width = pct + '%';
    if (pct > 50) bar.style.background = 'linear-gradient(90deg, #4a4, #6c6)';
    else if (pct > 25) bar.style.background = 'linear-gradient(90deg, #aa4, #cc6)';
    else bar.style.background = 'linear-gradient(90deg, #a44, #c66)';
  }
  document.getElementById('score-text').textContent = score;
  document.getElementById('wave-text').textContent = currentWave;
  document.getElementById('enemies-display').textContent = 'Enemies: ' + waveEnemiesAlive + (scrap > 0 ? '  |  Scrap: ' + scrap : '');

  // Wave progress bar
  if (waveEnemyTotal > 0) {
    const killed = waveEnemyTotal - waveEnemiesAlive;
    document.getElementById('wave-progress').style.width = (killed / waveEnemyTotal * 100) + '%';
  }

  // Kill streak timer
  if (killStreakTimer > 0) {
    killStreakTimer -= 0.016;
    if (killStreakTimer <= 0) {
      document.getElementById('kill-streak').classList.remove('visible');
      killStreak = 0;
    }
  }

  // Engine sound
  updateEngineSound(isPlayerMoving);

  // Minimap (update every 3 frames for perf)
  minimapCounter++;
  if (minimapCounter % 3 === 0) drawMinimap();

  // Power-up indicators
  updatePowerupHUD();
}

function updatePowerupHUD() {
  const puBar = document.getElementById('powerup-bar');
  const existing = puBar.children.length;
  const needed = (activePowerups.shield > 0 ? 1 : 0) + (activePowerups.speed > 0 ? 1 : 0) + (activePowerups.rapidfire > 0 ? 1 : 0);

  // Rebuild only if count changed
  if (existing !== needed) {
    while (puBar.firstChild) puBar.removeChild(puBar.firstChild);

    const pups = [
      { key: 'shield', icon: '\u{1F6E1}', color: '#4488ff' },
      { key: 'speed', icon: '\u26A1', color: '#ffaa00' },
      { key: 'rapidfire', icon: '\uD83D\uDD25', color: '#ff44ff' },
    ];
    pups.forEach(p => {
      if (activePowerups[p.key] <= 0) return;
      const div = document.createElement('div');
      div.className = 'powerup-icon';
      div.style.borderColor = p.color;
      div.dataset.powerup = p.key;
      const span = document.createElement('span');
      span.textContent = p.icon;
      div.appendChild(span);
      const timer = document.createElement('div');
      timer.className = 'pu-timer';
      timer.style.background = p.color;
      div.appendChild(timer);
      puBar.appendChild(div);
    });
  }

  // Update timer widths
  puBar.querySelectorAll('.powerup-icon').forEach(el => {
    const key = el.dataset.powerup;
    if (key && activePowerups[key] !== undefined) {
      const timer = el.querySelector('.pu-timer');
      if (timer) timer.style.width = (activePowerups[key] / POWERUP_DURATION * 100) + '%';
    }
  });
}

// ============================================================
// 9. GAME STATE
// ============================================================
function gameOver() {
  gameState = 'gameover';
  document.getElementById('final-score').textContent = 'Score: ' + score;
  document.getElementById('final-wave').textContent = 'Survived to Wave ' + currentWave;
  document.getElementById('game-over').classList.add('visible');
  document.body.style.cursor = 'default';
}

function restartGame() {
  // Clear everything
  const toRemove = [...entities];
  toRemove.forEach(id => destroyEntity(id));
  particles.forEach(p => {
    scene.remove(p.mesh);
    if (p.mesh.geometry) p.mesh.geometry.dispose();
    if (p.mesh.material) p.mesh.material.dispose();
  });
  particles.length = 0;

  // Remove rubble (static meshes added to scene)
  const toRemoveFromScene = [];
  scene.traverse(child => {
    if (child.geometry && child.geometry.type === 'BoxGeometry' &&
        child.material && child.material.color &&
        child.material.color.getHex() === 0x6a5a4a) {
      toRemoveFromScene.push(child);
    }
  });
  toRemoveFromScene.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });

  // Reset state
  score = 0;
  currentWave = 1;
  waveTimer = 0;
  waveEnemiesAlive = 0;
  waveSpawned = false;
  waveEnemyTotal = 0;
  killStreak = 0;
  killStreakTimer = 0;
  waveEnemyTotal = 0;
  scrap = 0;
  shopOpen = false;
  shopTimer = 0;
  Object.keys(upgrades).forEach(k => upgrades[k].level = 0);
  currentWeather = 'clear';
  clearWeatherParticles();
  stopRainSound();
  const clearEffect = WEATHER_EFFECTS.clear;
  scene.fog.near = clearEffect.fogNear;
  scene.fog.far = clearEffect.fogFar;
  scene.fog.color.setHex(clearEffect.fogColor);
  scene.background.setHex(clearEffect.skyColor);
  activePowerups.shield = 0;
  activePowerups.speed = 0;
  activePowerups.rapidfire = 0;
  powerupEntities.clear();
  currentWeapon = 0;
  gameState = 'playing';
  nextEntityId = 1;

  // Clear grid
  for (let x = 0; x < MAP_SIZE; x++) {
    for (let z = 0; z < MAP_SIZE; z++) {
      mapGrid[x] = [];
      mapGrid[x][z] = 0;
    }
  }

  // Rebuild
  buildMap();
  playerEntityId = createTank(0, 0, 'player');
  announceWave(1);
  spawnWave(1);

  document.getElementById('game-over').classList.remove('visible');
  document.body.style.cursor = 'none';
  clock.getDelta(); // reset clock
}

// ============================================================
// 10. GAME LOOP
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05); // cap delta

  updatePlayer(dt);
  updateShopTimer(dt);
  updateAI(dt);
  updateCombat(dt);
  updatePowerups(dt);
  updateWeather(dt);
  updateWaves(dt);
  updateCamera(dt);
  updateParticles(dt);
  updateHUD();

  renderer.render(scene, camera);
}

// ============================================================
// 11. INIT
// ============================================================
init();
</script>
